# Docker Compose OIDC overlay — Keycloak identity provider for local testing
#
# Usage:
#   # One-time setup: generate local dev CA + Keycloak TLS cert
#   pwsh deployments/keycloak/generate-dev-certs.ps1
#   # Then bring the stack up:
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml up -d
#
# This overlay:
#   1. Adds a Keycloak service pre-configured with two realms:
#        - "terraform-registry"      (registry users)
#        - "terraform-state-manager" (state manager users, for shared local dev)
#      All test users have password: TestPass123!
#   2. Reconfigures the backend to use Keycloak for OIDC authentication
#      over HTTPS (backend >= 0.6.0 requires HTTPS issuer URLs).
#   3. Disables DEV_MODE so the real OIDC flow is exercised.
#   4. Mounts a local dev CA into the backend so it trusts the Keycloak
#      TLS chain (see deployments/keycloak/generate-dev-certs.ps1).
#   5. Attaches Keycloak to the "shared-keycloak" external network so the
#      state manager stack can reach it without spinning up its own Keycloak.
#
# Keycloak admin console: https://keycloak:8443/admin  (admin / admin)
# Registry realm discovery:      https://keycloak:8443/realms/terraform-registry/.well-known/openid-configuration
# State manager realm discovery: https://keycloak:8443/realms/terraform-state-manager/.well-known/openid-configuration
#
# HOSTS FILE REQUIRED: Add this line to C:\Windows\System32\drivers\etc\hosts
#   127.0.0.1  registry.local keycloak
#
# NETWORK SETUP REQUIRED (once):
#   docker network create shared-keycloak
#
# Registry test users (password for all: TestPass123!):
#   admin.user   alice.dev   bob.ops   carol.qa
#   dave.readonly   eve.viewer   frank.test
#
# State manager test users (password for all: TestPass123!):
#   admin.user   alice.analyst   bob.operator   carol.viewer

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: terraform-registry-keycloak
    # start-dev: embedded H2 DB, development only.
    # --import-realm: auto-imports any JSON files in /opt/keycloak/data/import/
    # Serves HTTPS on 8443 using a locally generated dev cert (see generate-dev-certs.ps1).
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Use embedded H2 database — no separate DB needed for local testing.
      # Realm is always re-imported from the JSON file on startup so no data loss concerns.
      KC_DB: dev-file
      # HTTP disabled; HTTPS only. Backend >= 0.6.0 rejects http:// OIDC issuers.
      KC_HTTP_ENABLED: "false"
      KC_HTTPS_PORT: "8443"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/keycloak.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/keycloak.key
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # Expose the health endpoint so Docker can use it for the healthcheck
      KC_HEALTH_ENABLED: "true"
      # Set hostname to "keycloak" — the Docker service name reachable by both:
      #   - the backend container (via Docker internal DNS)
      #   - the host browser (via 127.0.0.1 keycloak in the hosts file)
      # This ensures the OIDC issuer URL in tokens matches the URL the backend uses for discovery.
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_PORT: "8443"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/tsm-realm-export.json:/opt/keycloak/data/import/tsm-realm-export.json:ro
      - ./certs/keycloak.crt:/opt/keycloak/certs/keycloak.crt:ro
      - ./certs/keycloak.key:/opt/keycloak/certs/keycloak.key:ro
    ports:
      - "8443:8443"
      - "9000:9000"
    healthcheck:
      # Keycloak 26 serves the management port (9000) over HTTPS when HTTPS is enabled,
      # and the UBI minimal image lacks curl/wget/openssl-client. Fall back to a TCP
      # probe via bash /dev/tcp — port 9000 only opens once Quarkus is fully started
      # and realms have been imported.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - registry-network
      - shared-keycloak
    restart: unless-stopped

  backend:
    # Wait for Keycloak to be healthy before starting the backend
    depends_on:
      keycloak:
        condition: service_healthy
    # Mount a combined CA bundle (Alpine system CAs + local dev CA) so Go's
    # TLS client trusts the Keycloak HTTPS cert. Generated by generate-dev-certs.ps1.
    volumes:
      - ./certs/ca-bundle.crt:/etc/ssl/certs/ca-certificates.crt:ro
    environment:
      # Disable DEV_MODE — removes the /api/v1/dev/login shortcut so the real OIDC flow is tested
      DEV_MODE: "false"

      # Enable OIDC authentication
      TFR_AUTH_OIDC_ENABLED: "true"

      # Issuer URL uses the "keycloak" hostname + HTTPS port — matches KC_HOSTNAME above.
      # The backend resolves "keycloak" via Docker internal DNS and validates the TLS chain
      # via the mounted dev CA bundle. The browser resolves "keycloak" via the hosts file
      # (127.0.0.1 keycloak). Both see the same issuer URL, satisfying go-oidc validation.
      TFR_AUTH_OIDC_ISSUER_URL: "https://keycloak:8443/realms/terraform-registry"

      TFR_AUTH_OIDC_CLIENT_ID: "terraform-registry"
      TFR_AUTH_OIDC_CLIENT_SECRET: "terraform-registry-secret"

      # Callback URL — must match what's in the Keycloak client's Valid Redirect URIs.
      # This is the public (browser-facing) URL that Keycloak redirects to after login.
      TFR_AUTH_OIDC_REDIRECT_URL: "https://registry.local:3000/api/v1/auth/callback"

      TFR_AUTH_OIDC_SCOPES: "openid,email,profile"

  # One-shot service that seeds the database after the backend has applied its migrations.
  # Marks setup as complete (no wizard needed — OIDC configured via env vars) and
  # pre-provisions admin@example.com (Keycloak's admin.user) as a registry admin.
  # Runs every time the stack starts but the SQL is idempotent (ON CONFLICT DO NOTHING/UPDATE).
  db-seed:
    image: postgres:16-alpine
    container_name: terraform-registry-db-seed
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: terraform_registry
      PGUSER: registry
      PGPASSWORD: ${POSTGRES_PASSWORD:-registry}
    volumes:
      - ./keycloak/seed-oidc-dev.sql:/seed.sql:ro
    command: psql -f /seed.sql
    networks:
      - registry-network
    restart: "no"

networks:
  # External network shared with the state manager stack so its backend
  # can reach this Keycloak container via the "keycloak" hostname.
  # Create once with: docker network create shared-keycloak
  shared-keycloak:
    external: true
