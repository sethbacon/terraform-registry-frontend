# Crowdin CLI configuration
# Docs: https://developer.crowdin.com/configuration-file/
# project_id and api_token are injected via environment variables
# set by the crowdin/github-action step (CROWDIN_PROJECT_ID, CROWDIN_PERSONAL_TOKEN).

"project_id_env": "CROWDIN_PROJECT_ID"
"api_token_env": "CROWDIN_PERSONAL_TOKEN"
"base_path": "."
"base_url": "https://api.crowdin.com"

"files":
  - "source": "/frontend/src/locales/en/translation.json"
    "translation": "/frontend/src/locales/%locale%/translation.json"
    "update_option": "update_as_unapproved"
