---
name: Setup frontend
description: >-
  Node.js + npm cache and optional dependency installs shared across all
  frontend workflows. The calling job must run actions/checkout first —
  this action does not include a checkout step.

inputs:
  node-version:
    description: Node.js version.
    required: false
    default: "22"
  install-deps:
    description: Run `npm ci` in frontend/.
    required: false
    default: "true"
  install-e2e-deps:
    description: Run `npm ci` in e2e/.
    required: false
    default: "false"
  install-playwright:
    description: Run `npx playwright install --with-deps` in e2e/.
    required: false
    default: "false"
  playwright-browsers:
    description: Browsers to pass to `playwright install` (space-separated).
    required: false
    default: "chromium"

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      if: inputs.install-deps == 'true'
      working-directory: frontend
      shell: bash
      run: npm ci

    - name: Install e2e dependencies
      if: inputs.install-e2e-deps == 'true'
      working-directory: e2e
      shell: bash
      run: npm ci

    - name: Install Playwright browsers
      if: inputs.install-playwright == 'true'
      working-directory: e2e
      shell: bash
      run: npx playwright install --with-deps ${{ inputs.playwright-browsers }}
