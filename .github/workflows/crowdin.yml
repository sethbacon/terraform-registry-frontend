# Crowdin translation sync
#
# Prerequisites — configure these secrets in GitHub repository settings:
#   CROWDIN_PROJECT_ID      — numeric Crowdin project ID
#   CROWDIN_PERSONAL_TOKEN  — personal API token with project read/write
#
# On push to main:   upload updated English source strings to Crowdin.
# Nightly:           download completed translations; open a PR if any changed.
#
# Enable this workflow once a Crowdin project is created and the secrets are set.

name: Crowdin — Translation sync

on:
  push:
    branches: [ main ]
    paths:
      - "frontend/src/locales/en/translation.json"
  schedule:
    # Download completed translations nightly at 03:17 UTC
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  SOURCE_FILE: frontend/src/locales/en/translation.json
  TRANSLATIONS_DIR: frontend/src/locales

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Upload the English reference strings whenever they change on main.
  # ──────────────────────────────────────────────────────────────────────────
  upload-sources:
    name: Upload English source strings
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Upload source file to Crowdin
        uses: crowdin/github-action@8971b3565d2e40cd0c8a5ed6df4aec73a75bac67 # v2.5.2
        with:
          upload_sources: true
          upload_translations: false
          create_pull_request: false
          crowdin_branch_name: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # Download completed translations and open a PR when any have changed.
  # ──────────────────────────────────────────────────────────────────────────
  download-translations:
    name: Download completed translations
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download translations from Crowdin
        uses: crowdin/github-action@8971b3565d2e40cd0c8a5ed6df4aec73a75bac67 # v2.5.2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          create_pull_request: true
          pull_request_base_branch_name: main
          pull_request_title: "i18n: update translations from Crowdin"
          pull_request_body: |
            Auto-generated by the Crowdin sync workflow.

            This PR contains the latest approved translations downloaded from Crowdin.

            **Review checklist:**
            - [ ] Machine-translated strings are marked as approved by a native speaker in Crowdin.
            - [ ] No English source strings appear verbatim in non-English files (sign of an untranslated key).
            - [ ] RTL locale files (ar, he) render correctly in a smoke test.
          localization_branch_name: i18n/crowdin-sync
          commit_message: "i18n: sync translations from Crowdin [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
