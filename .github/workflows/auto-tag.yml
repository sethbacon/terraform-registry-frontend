name: Auto-tag Release

# Automatically creates and pushes a semver tag when a release PR is merged
# to main. This eliminates the manual `git tag && git push` step and ensures
# the tag always points at the correct merge commit on main.
#
# Trigger: release.yml fires from the resulting tag push.
on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag:
    name: Create release tag
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore: release v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push tags

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Extract version from PR title
        id: version
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          VERSION=$(echo "$TITLE" | grep -oP 'v\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract semver from PR title: $TITLE"
            exit 1
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Verify tag does not already exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists."
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          echo "✅ Tag ${{ steps.version.outputs.tag }} pushed — release.yml will fire automatically."
