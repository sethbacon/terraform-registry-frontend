---
name: Weekly Security Scan

# Runs the full CI suite plus extended security checks every Monday.
# Uses ci.yml via workflow_call so all logic lives in one place; no
# duplicated steps.  Failures open a GitHub issue.
"on":
  schedule:
    - cron: "0 8 * * 1" # Every Monday 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ── Full CI ────────────────────────────────────────────
  # Calls ci.yml, which requests `packages: read` to pull the ghcr.io
  # backend image used by the Contract Check job. A reusable workflow can
  # only request permissions the caller has already granted, so we elevate
  # explicitly here.
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    permissions:
      contents: read
      packages: read

  # ── Dependency Audit ──────────────────────────────────
  npm-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-frontend
        with:
          install-e2e-deps: "true"

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Audit e2e dependencies
        working-directory: e2e
        run: npm audit --audit-level=high

  # ── OSV Scan ──────────────────────────────────────────
  osv-scan:
    name: OSV Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run OSV Scanner
        # v2.3.8
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2
        with:
          scan-args: |-
            --lockfile=frontend/package-lock.json
            --lockfile=e2e/package-lock.json

  # ── CodeQL ────────────────────────────────────────────
  # Scans both the application source (javascript-typescript) and the repo's
  # GitHub Actions workflows (actions). The `actions` leg is required to keep the
  # code-scanning tool-status configuration for this workflow current: a
  # previously-registered `actions` configuration reports a stale "configuration
  # error" on the Code scanning status page when no analysis refreshes it.
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, actions]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        # v4
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        # v4
        uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa

      - name: Analyze
        # v4
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          category: /language:${{ matrix.language }}

  # ── Flag stale Dependabot PRs ──────────────────────────
  stale-dependabot:
    name: Flag stale Dependabot PRs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Label Dependabot PRs open >14 days (lockfile changes)
        # v8
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 14);
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            for (const pr of prs.data) {
              if (pr.user.login !== 'dependabot[bot]') continue;
              if (new Date(pr.created_at) > cutoff) continue;
              const files = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });
              const touchesLockfile = files.data.some(f =>
                f.filename === 'frontend/package-lock.json' ||
                f.filename === 'e2e/package-lock.json'
              );
              if (!touchesLockfile) continue;
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['stale-security-patch'],
              });
            }

  # ── Notify on schedule failures ───────────────────────
  notify-on-failure:
    name: Create issue on failure
    runs-on: ubuntu-latest
    needs: [ci, npm-audit, osv-scan, codeql, stale-dependabot]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        # v8
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const title = `Weekly security scan failed — ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## Weekly Security Scan Failure',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'The weekly security scan failed. Please investigate before the next release.',
              '',
              'Common causes:',
              '- A new high/critical CVE in a transitive npm dependency',
              '- OSV Scanner flagged a known-vulnerable package version',
              '- CodeQL found a security-and-quality issue in new code',
              '- A Dependabot security PR has been open for more than 14 days',
              '- The Node.js 22 base image changed in a breaking way',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'ci'],
            });
