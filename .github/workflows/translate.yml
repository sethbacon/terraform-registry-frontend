# Translation sync — DeepL + Google Translate
#
# Prerequisites — configure these secrets in GitHub repository settings:
#   DEEPL_API_KEY              — DeepL API key (free or pro tier)
#   GOOGLE_TRANSLATE_API_KEY   — Google Cloud Translation API key
#
# On push to main:   translate new/changed English strings and open a PR.
# Manual dispatch:   trigger a full translation sync on demand.

name: Translate — DeepL + Google

"on":
  push:
    branches: [ main ]
    paths:
      - "frontend/src/locales/en/translation.json"
  workflow_dispatch:

jobs:
  translate:
    name: Translate and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Translate es/fr/de/pt/nl/nb/it via DeepL
        run: node scripts/translate.mjs --provider deepl --langs es,fr,de,pt,nl,nb,it
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}

      - name: Translate ja/zh via Google Translate
        run: node scripts/translate.mjs --provider google --langs ja,zh
        env:
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}

      - name: Create PR with translations
        # v7.0.8
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e
        with:
          branch: i18n/auto-translate
          title: "i18n: update translations"
          body: |
            Auto-generated by the translation workflow (DeepL + Google Translate).

            **Review checklist:**
            - [ ] Spot-check a few strings in each language for accuracy
            - [ ] No English source strings appear verbatim in non-English files
            - [ ] Interpolation tokens (`{{name}}`) are preserved correctly
          commit-message: "i18n: update translations [skip ci]"
          delete-branch: true
