# Translation sync — DeepL
#
# Prerequisites — configure these secrets in GitHub repository settings:
#   DEEPL_API_KEY  — DeepL API key (free or pro tier)
#
# On push to main:   translate new/changed English strings and open a PR.
# Manual dispatch:   trigger a full translation sync on demand.

name: Translate — DeepL

"on":
  push:
    branches: [ main ]
    paths:
      - "frontend/src/locales/en/translation.json"
  workflow_dispatch:

jobs:
  translate:
    name: Translate and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Translate all locales via DeepL
        run: node scripts/translate.mjs --all
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}

      - name: Create PR with translations
        # v8.1.1
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          branch: i18n/auto-translate
          title: "i18n: update translations"
          body: |
            Auto-generated by the translation workflow (DeepL).

            **Review checklist:**
            - [ ] Spot-check a few strings in each language for accuracy
            - [ ] No English source strings appear verbatim in non-English files
            - [ ] Interpolation tokens (`{{name}}`) are preserved correctly
          commit-message: "i18n: update translations [skip ci]"
          delete-branch: true
