name: Update Wiki Version

# Automatically update the wiki Home page version badge after a release.
# Runs after the Release workflow completes, or on manual dispatch.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to set (e.g., v0.3.2). Defaults to latest release tag."
        required: false
        type: string

jobs:
  update-wiki:
    name: Update wiki version
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push to the wiki repo
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Update version in Home.md
        working-directory: wiki
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "::error::No version tag found"
            exit 1
          fi
          # Replace the version line: **Current:** vX.Y.Z | **License:** Apache 2.0
          sed -i "s|\*\*Current:\*\* v[0-9]*\.[0-9]*\.[0-9]*[^ ]*|\*\*Current:\*\* ${TAG}|" Home.md
          echo "Updated Home.md to version ${TAG}"
          grep "Current:" Home.md

      - name: Commit and push
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add Home.md
          git commit -m "docs: update version to ${{ steps.version.outputs.tag }}"
          git push
