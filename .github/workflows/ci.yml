---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  workflow_call: {} # allows release.yml and weekly-security.yml to call this

concurrency:
  group: ci-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  packages: read

jobs:
  # ── Lint ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-frontend

      - name: Lint
        working-directory: frontend
        run: npm run lint

  # ── Typecheck ─────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-frontend

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Unit Tests — sharded (4 parallel runners) ─────────
  # Each shard runs ~25% of tests + collects coverage, writing a blob to
  # .vitest-reports/blob-<shard>.json with an explicit unique filename so
  # the merge job can combine them. Coverage thresholds are disabled per
  # shard (partial coverage will always be below the configured floor);
  # the unit-test-coverage merge job re-enforces them on the combined data.
  unit-test:
    name: Unit Tests (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-frontend

      - name: Run tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        working-directory: frontend
        run: >-
          npx vitest run --coverage
          --reporter=blob
          --outputFile.blob=.vitest-reports/blob-${{ matrix.shard }}.json
          --shard=${{ matrix.shard }}/${{ strategy.job-total }}
          --coverage.thresholds.statements=0
          --coverage.thresholds.branches=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.lines=0

      - name: List blob reports (debug)
        if: always()
        working-directory: frontend
        run: ls -la .vitest-reports/ || echo "no .vitest-reports/ directory"

      - name: Upload blob report
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: frontend/.vitest-reports/blob-${{ matrix.shard }}.json
          if-no-files-found: error

  # ── Unit Test Coverage (merge blob shards) ────────────
  # Downloads all 4 shard blobs, merges them with `vitest --merge-reports`,
  # produces combined coverage, applies real thresholds, and updates badge.
  unit-test-coverage:
    name: Unit Test Coverage
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-frontend

      - name: Download blob reports
        # v8
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: vitest-blob-*
          path: frontend/.vitest-reports/
          merge-multiple: true

      - name: List downloaded blobs (debug)
        working-directory: frontend
        run: ls -la .vitest-reports/

      - name: Merge reports and generate coverage
        working-directory: frontend
        # `--merge-reports=<path>` is a CLI flag in vitest v4 (the subcommand
        # form `vitest merge-reports` is parsed as a test name filter and
        # falls through to a "no test files found" error).
        run: npx vitest --merge-reports=.vitest-reports --reporter=verbose --coverage

      - name: Upload coverage report
        if: always()
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: frontend/coverage/

      - name: Compute coverage badge inputs
        # Only update the badge on pushes to main or manual dispatch — not on PRs or workflow_call.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: badge
        working-directory: frontend
        run: |
          COVERAGE=$(node -e "
            const r = require('./coverage/coverage-summary.json');
            console.log(r.total.statements.pct);
          ")
          echo "percent=${COVERAGE}" >> $GITHUB_OUTPUT
          if awk "BEGIN {exit !(${COVERAGE} >= 80)}"; then
            echo "color=brightgreen" >> $GITHUB_OUTPUT
          elif awk "BEGIN {exit !(${COVERAGE} >= 70)}"; then
            echo "color=green" >> $GITHUB_OUTPUT
          elif awk "BEGIN {exit !(${COVERAGE} >= 60)}"; then
            echo "color=yellow" >> $GITHUB_OUTPUT
          else
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Update coverage badge gist
        # Requires:
        #   secrets.GIST_TOKEN  — GitHub PAT with the 'gist' scope
        #   vars.COVERAGE_GIST_ID — ID of a pre-created public gist (same gist as backend, different filename)
        # The action writes / overwrites 'frontend-coverage.json' in that gist, which the
        # shields.io endpoint badge in README.md reads.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: frontend-coverage.json
          label: Coverage
          message: ${{ steps.badge.outputs.percent }}%
          color: ${{ steps.badge.outputs.color }}

  # ── Build ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-frontend

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: frontend-dist
          path: frontend/dist

  # ── Contract check ────────────────────────────────────
  # Spin up the backend at a pinned image tag, fetch live /swagger.json, and
  # verify every route api.ts calls actually exists on that backend. Catches
  # the "frontend calls a route that does not exist" bug class before merge.
  contract-check:
    name: Contract Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-frontend

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start contract-check stack
        run: >-
          docker compose -f deployments/docker-compose.contract-check.yml up -d

      - name: Wait for backend /health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 3s"
            sleep 3
          done
          echo "Backend did not become ready in time"
          docker compose -f deployments/docker-compose.contract-check.yml logs backend
          exit 1

      - name: Run contract check
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:8080
        run: npm run contract:check

      - name: Dump backend logs on failure
        if: failure()
        run: >-
          docker compose -f deployments/docker-compose.contract-check.yml logs backend

      - name: Tear down stack
        if: always()
        run: >-
          docker compose -f deployments/docker-compose.contract-check.yml down --volumes

  # ── E2E (gated) ───────────────────────────────────────
  e2e-gated:
    name: E2E (gated/manual)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-test-coverage, build, contract-check]
    # E2E is a required gate: failures block the release pipeline.
    if: >-
      github.event_name == 'workflow_dispatch' || github.event_name ==
      'workflow_call' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-frontend
        with:
          install-deps: "false"
          install-e2e-deps: "true"
          install-playwright: "true"
          playwright-browsers: "chromium firefox webkit"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start test compose
        # Pulls backend from ghcr.io; builds frontend locally
        run: >-
          docker compose -f deployments/docker-compose.test.yml up -d

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend on port 3000..."
          echo "(backend/postgres readiness via Docker healthchecks)"
          frontend_up=0
          for i in {1..60}; do
            code=$(curl -sk https://localhost:3000/ \
              -o /dev/null -w "%{http_code}" 2>/dev/null || true)
            if echo "$code" | grep -qE "^[23]"; then
              echo "Frontend ready (HTTP $code)"
              frontend_up=1
              break
            fi
            sleep 3
          done
          if [ "$frontend_up" -eq 0 ]; then
            echo "ERROR: frontend never became ready"
            exit 1
          fi

      - name: Run Playwright tests
        working-directory: e2e
        # workers=2 (not 4) — under heavier parallelism, Firefox occasionally
        # hangs `waitForLoadState('networkidle')` on /modules and /providers,
        # exhausting the single retry and tripping --max-failures=1. Same
        # mitigation that PR #182 originally applied; see #233 post-merge run
        # 25007086815 for the regression that prompted reverting to 2.
        run: >-
          npx playwright test --workers=2 --max-failures=1 --retries=1
          --reporter=list --grep-invert="Visual regression"

      - name: Upload Playwright artifacts
        # v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: e2e/playwright-report

      - name: Dump container logs
        if: failure()
        run: |
          for svc in backend seed-db frontend postgres; do
            echo "===== $svc ====="
            docker compose \
              -f deployments/docker-compose.test.yml \
              logs "$svc" || true
          done

      - name: Tear down test compose
        if: always()
        run: >-
          docker compose -f deployments/docker-compose.test.yml down --volumes
