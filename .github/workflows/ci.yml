name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, development]
  workflow_dispatch: {}
  workflow_call: {} # allows release.yml to call this as a prerequisite

concurrency:
  group: ci-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  packages: read

jobs:
  frontend-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: frontend-dist
          path: frontend/dist

  e2e-gated:
    name: E2E (gated/manual)
    runs-on: ubuntu-latest
    needs: frontend-lint-build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"

      - name: Start test compose
        # Pulls backend from ghcr.io; builds frontend locally
        run: docker compose -f deployments/docker-compose.test.yml up -d

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend HTTPS on port 3000..."
          echo "(backend/postgres readiness is enforced by Docker healthchecks in compose)"
          frontend_up=0
          for i in {1..60}; do
            code=$(curl -sk https://localhost:3000/ -o /dev/null -w "%{http_code}" 2>/dev/null || true)
            if echo "$code" | grep -qE "^[23]"; then echo "Frontend ready (HTTP $code)"; frontend_up=1; break; fi
            sleep 3
          done
          if [ "$frontend_up" -eq 0 ]; then echo "ERROR: frontend never became ready"; exit 1; fi

      - name: Install e2e deps & Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium firefox

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test --workers=1 --max-failures=1 --retries=1 --reporter=list

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-report
          path: e2e/playwright-report

      - name: Dump container logs
        if: always()
        run: |
          echo "===== backend ====="
          docker compose -f deployments/docker-compose.test.yml logs backend || true
          echo "===== seed-db ====="
          docker compose -f deployments/docker-compose.test.yml logs seed-db || true
          echo "===== frontend ====="
          docker compose -f deployments/docker-compose.test.yml logs frontend || true
          echo "===== postgres ====="
          docker compose -f deployments/docker-compose.test.yml logs postgres || true

      - name: Tear down test compose
        if: always()
        run: docker compose -f deployments/docker-compose.test.yml down --volumes
