---
name: CI

"on":
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, development ]
  workflow_dispatch: {}
  workflow_call: {} # allows release.yml to call this

concurrency:
  group: ci-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  packages: read

jobs:
  # ── Lint ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-frontend

      - name: Lint
        working-directory: frontend
        run: npm run lint

  # ── Typecheck ─────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-frontend

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Unit Tests with Coverage ──────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-frontend

      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        # v7
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: coverage-report
          path: frontend/coverage/

      - name: Compute coverage badge inputs
        # Only update the badge on pushes to main/development or manual dispatch — not on PRs.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: badge
        working-directory: frontend
        run: |
          COVERAGE=$(node -e "
            const r = require('./coverage/coverage-summary.json');
            console.log(r.total.statements.pct);
          ")
          echo "percent=${COVERAGE}" >> $GITHUB_OUTPUT
          if awk "BEGIN {exit !(${COVERAGE} >= 80)}"; then
            echo "color=brightgreen" >> $GITHUB_OUTPUT
          elif awk "BEGIN {exit !(${COVERAGE} >= 70)}"; then
            echo "color=green" >> $GITHUB_OUTPUT
          elif awk "BEGIN {exit !(${COVERAGE} >= 60)}"; then
            echo "color=yellow" >> $GITHUB_OUTPUT
          else
            echo "color=red" >> $GITHUB_OUTPUT
          fi

      - name: Update coverage badge gist
        # Requires:
        #   secrets.GIST_TOKEN  — GitHub PAT with the 'gist' scope
        #   vars.COVERAGE_GIST_ID — ID of a pre-created public gist (same gist as backend, different filename)
        # The action writes / overwrites 'frontend-coverage.json' in that gist, which the
        # shields.io endpoint badge in README.md reads.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: frontend-coverage.json
          label: Coverage
          message: ${{ steps.badge.outputs.percent }}%
          color: ${{ steps.badge.outputs.color }}

  # ── Contract Test (Swagger type-check) ────────────────
  contract-check:
    name: Contract Check
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-frontend

      - name: Convert Swagger 2.0 to OpenAPI 3.0
        working-directory: frontend
        run: npx --yes swagger2openapi openapi/swagger.json -o
          openapi/openapi3.json -p

      - name: Regenerate API types from snapshot
        working-directory: frontend
        run: npx openapi-typescript openapi/openapi3.json --output
          src/services/generated/api.ts

      - name: Check for uncommitted drift
        working-directory: frontend
        run: |
          if ! git diff --exit-code src/services/generated/api.ts; then
            echo ""
            echo "ERROR: src/services/generated/api.ts is out of sync with openapi/swagger.json."
            echo "Run 'npm run generate:api' locally and commit the updated file."
            exit 1
          fi

      - name: Type-check generated API types
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Build ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-frontend

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        # v7
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: frontend-dist
          path: frontend/dist

  e2e-gated:
    name: E2E (gated/manual)
    runs-on: ubuntu-latest
    needs: [ lint, typecheck, unit-test, contract-check, build ]
    # E2E is a required gate: failures block the release pipeline.
    if: >-
      github.event_name == 'workflow_dispatch' || github.event_name ==
      'workflow_call' || github.ref == 'refs/heads/main'

    steps:
      - uses: ./.github/actions/setup-frontend
        with:
          install-deps: "false"
          install-e2e-deps: "true"
          install-playwright: "true"
          playwright-browsers: "chromium firefox webkit"

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start test compose
        # Pulls backend from ghcr.io; builds frontend locally
        run: >-
          docker compose -f deployments/docker-compose.test.yml up -d

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend on port 3000..."
          echo "(backend/postgres readiness via Docker healthchecks)"
          frontend_up=0
          for i in {1..60}; do
            code=$(curl -sk https://localhost:3000/ \
              -o /dev/null -w "%{http_code}" 2>/dev/null || true)
            if echo "$code" | grep -qE "^[23]"; then
              echo "Frontend ready (HTTP $code)"
              frontend_up=1
              break
            fi
            sleep 3
          done
          if [ "$frontend_up" -eq 0 ]; then
            echo "ERROR: frontend never became ready"
            exit 1
          fi

      - name: Run Playwright tests
        working-directory: e2e
        run: >-
          npx playwright test --workers=4 --max-failures=1 --retries=1
          --reporter=list --grep-invert="Visual regression"

      - name: Upload Playwright artifacts
        # v7
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: playwright-report
          path: e2e/playwright-report

      - name: Dump container logs
        if: failure()
        run: |
          for svc in backend seed-db frontend postgres; do
            echo "===== $svc ====="
            docker compose \
              -f deployments/docker-compose.test.yml \
              logs "$svc" || true
          done

      - name: Tear down test compose
        if: always()
        run: >-
          docker compose -f deployments/docker-compose.test.yml down --volumes
