name: Release

# Publish a Docker image to ghcr.io whenever a semver tag is pushed.
# Tags must match `v*.*.*` (e.g., v1.2.3).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g., v1.2.3)"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/terraform-registry-frontend

jobs:
  # ── Branch guard — releases must originate from main ─────────────────────
  # GitHub Actions has no native way to filter tags by branch.  This job
  # fetches origin/main and verifies that the tagged commit is an ancestor of
  # (i.e. reachable from) main.  All downstream jobs depend on this one, so a
  # tag pushed on any other branch fails fast without building any artifacts.
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # need full history to walk ancestry

      - name: Verify package.json version matches release tag
        working-directory: frontend
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::package.json version (${PKG_VERSION}) does not match release tag (${TAG}). Bump frontend/package.json 'version' before pushing the tag."
            exit 1
          fi
          echo "Version check passed: ${TAG}"

      - name: Check tagged commit is reachable from main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must be pushed on the main branch." \
                 "This tag points to a commit that is not in origin/main."
            exit 1
          fi
          echo "✅ Tag is on main — proceeding with release."

  # ── CI gate — full test suite must pass before any release artifact is built ──
  ci:
    name: CI
    needs: guard
    secrets: inherit # passes GIST_TOKEN (coverage badge) and vars to the reusable workflow
    uses: ./.github/workflows/ci.yml
    with:
      run-security-deep: "false"

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write # required to push to ghcr.io
      id-token: write # required for Sigstore OIDC (cosign keyless signing)
      attestations: write # required for SLSA provenance attestation

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}},value=${{ steps.tag.outputs.value }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: frontend/
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Sign image with cosign (keyless)
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write # required to create releases

    steps:
      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          body: |
            ## Docker Image

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```
          generate_release_notes: true

  # ── Update wiki version badge ────────────────────────────────────────────
  update-wiki:
    name: Update wiki version badge
    runs-on: ubuntu-latest
    needs: release
    continue-on-error: true # wiki update failure must not block the release
    permissions:
      contents: write
      issues: write

    steps:
      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone wiki
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" \
            wiki

      - name: Update version in Home.md
        working-directory: wiki
        run: |
          TAG="${{ steps.version.outputs.version }}"
          sed -i \
            "s|\*\*Current:\*\* v[0-9]*\.[0-9]*\.[0-9]*[^ ]*|\*\*Current:\*\* ${TAG}|" \
            Home.md
          echo "Updated Home.md to ${TAG}"
          grep "Current:" Home.md

      - name: Commit and push
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add Home.md
          git commit -m "docs: update version to ${{ steps.version.outputs.version }}"
          git push

      - name: Open issue on wiki update failure
        if: failure()
        # v8
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Wiki version badge not updated for ${{ steps.version.outputs.version }}`,
              body: [
                '## Wiki update failed',
                '',
                `**Release:** ${{ steps.version.outputs.version }}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'The automatic wiki badge update failed. Run the **Update Wiki (manual)** workflow dispatch to fix it.',
              ].join('\n'),
              labels: ['bug', 'ci'],
            });
