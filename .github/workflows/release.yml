name: Release

# Publish a Docker image to ghcr.io whenever a semver tag is pushed.
# Tags must match `v*.*.*` (e.g., v1.2.3).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g., v1.2.3)"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/terraform-registry-frontend

jobs:
  # ── Branch guard — releases must originate from main ─────────────────────
  # GitHub Actions has no native way to filter tags by branch.  This job
  # fetches origin/main and verifies that the tagged commit is an ancestor of
  # (i.e. reachable from) main.  All downstream jobs depend on this one, so a
  # tag pushed on any other branch fails fast without building any artifacts.
  guard:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0 # need full history to walk ancestry

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package.json version matches release tag
        working-directory: frontend
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::package.json version (${PKG_VERSION}) does not match release tag (${TAG}). Bump frontend/package.json 'version' before pushing the tag."
            exit 1
          fi
          echo "Version check passed: ${TAG}"

      - name: Check tagged commit is reachable from main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must be pushed on the main branch." \
                 "This tag points to a commit that is not in origin/main."
            exit 1
          fi
          echo "✅ Tag is on main — proceeding with release."

  # ── CI gate — full test suite must pass before any release artifact is built ──
  ci:
    name: CI
    needs: guard
    secrets: inherit # passes GIST_TOKEN (coverage badge) and vars to the reusable workflow
    uses: ./.github/workflows/ci.yml

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [guard, ci]
    permissions:
      contents: read
      packages: write # required to push to ghcr.io
      id-token: write # required for Sigstore OIDC (cosign keyless signing)
      attestations: write # required for SLSA provenance attestation

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.guard.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.guard.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.guard.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: frontend/
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # GitHub Packages read token so the Docker build can npm-install the private
          # @sethbacon/* dependency (consumed via --mount=type=secret in the Dockerfile).
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

      - name: Trivy image scan (published digest)
        # Scan the real pushed digest for OS-package and dependency CVEs
        # before it's attested/signed.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          # Only fail on vulnerabilities that have a fix available; un-actionable
          # (no-fix-yet) CVEs shouldn't block a release.
          ignore-unfixed: true
          exit-code: 1
          format: table

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          # The "Protect release tags" ruleset makes the tag's GitHub Release
          # (already created by release-please by the time this runs) immutable,
          # so attaching the SBOM as a release asset always 404s/403s with
          # "Cannot upload assets to an immutable release." The SBOM is still
          # published as a workflow-run artifact (upload-artifact stays default
          # true) — just not as a release asset.
          upload-release-assets: false

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign (keyless)
        run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{
          steps.build.outputs.digest }}"

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [guard, docker]
    permissions:
      contents: write # required to create releases

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: Release ${{ needs.guard.outputs.version }}
          tag_name: ${{ needs.guard.outputs.version }}
          body: |
            ## Docker Image

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.guard.outputs.version }}
            ```
          generate_release_notes: true
  # Wiki sync runs in its own workflow (.github/workflows/wiki-sync.yml)
  # and is triggered by the release event so the wiki version badge and
  # all documentation pages are refreshed together.
